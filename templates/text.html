<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECL Certificate Validation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #ffffff;
      color: #111;
      padding: 40px 20px 60px;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: clamp(20px, 5.5vw, 26px);
      font-weight: 800;
      color: #1a2e5a;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      line-height: 1.3;
      margin-bottom: 32px;
    }

    .badge {
      background: #27ae60;
      color: #fff;
      text-align: center;
      font-size: clamp(15px, 4vw, 17px);
      font-weight: 600;
      border-radius: 10px;
      padding: 14px 24px;
      margin-bottom: 36px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #cdd2db;
      border-radius: 14px;
      overflow: hidden;
    }

    tr { border-bottom: 1px solid #e8eaee; }
    tr:last-child { border-bottom: none; }

    td {
      padding: 14px 18px;
      font-size: clamp(14px, 3.8vw, 16px);
      vertical-align: top;
      line-height: 1.4;
    }

    td:first-child {
      color: #444;
      font-weight: 500;
      width: 42%;
      white-space: nowrap;
    }

    td:last-child {
      color: #111;
      font-weight: 400;
    }
  </style>
</head>
<body>

  <h1>ECL Language Examination Validation</h1>

  <div class="badge">This certificate is valid.</div>

  <table>
    <tr><td>Name:</td><td>Mukhammad Rashidov</td></tr>
    <tr><td>Language:</td><td>German</td></tr>
    <tr><td>Level:</td><td>B2</td></tr>
    <tr><td>Type:</td><td>Complex</td></tr>
    <tr><td>Centre No:</td><td>UZ-998002</td></tr>
    <tr><td>Date:</td><td>06/08/2024</td></tr>
  </table>

</body>
</html>
